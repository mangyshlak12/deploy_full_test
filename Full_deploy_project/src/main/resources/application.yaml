spring:
  application:
    name: Full_deploy_project
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
